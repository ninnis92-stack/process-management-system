name: Staging Deploy

on:
  push:
    branches:
      - staging

env:
  FLY_API_TOKEN_SECRET_NAME: FLY_API_TOKEN
  FLY_APP_SECRET_NAME: FLY_APP

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        run: python -m pytest -q
      - name: Deploy to Fly
        env:
          FLY_API_TOKEN: ${{ secrets[env.FLY_API_TOKEN_SECRET_NAME] }}
          FLY_APP: ${{ secrets[env.FLY_APP_SECRET_NAME] }}
        run: |
          curl -L https://fly.io/install.sh | sh
          export PATH="$HOME/.fly/bin:$PATH"
          flyctl deploy -a $FLY_APP
