name: Deploy to Fly

on:
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        env:
          UPLOAD_FOLDER: ${{ github.workspace }}/uploads
          AUTO_CREATE_DB: "True"
          WTF_CSRF_ENABLED: "False"
          TESTING: "True"
        run: |
          mkdir -p "$UPLOAD_FOLDER"
          PYTHONPATH=. pytest -q

  deploy:
    name: Deploy app
    needs: test
    runs-on: ubuntu-latest
    concurrency: deploy-group
    steps:
      - uses: actions/checkout@v4
      - name: Install flyctl
        run: |
          curl -L https://fly.io/install.sh | sh
      - name: Deploy to Fly
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          if [ -z "$FLY_API_TOKEN" ]; then
            echo "::warning::FLY_API_TOKEN secret is not set. Skipping deployment."
            echo "To enable deployment, add the FLY_API_TOKEN secret to your repository settings."
            exit 0
          fi
          ~/.fly/bin/flyctl deploy -a process-management-prototype-lingering-bush-6175
