# Manual fallback deploy so `deploy.yml` remains the primary automated path.

name: Fly Deploy Manual
on:
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy app
    runs-on: ubuntu-latest
    concurrency: deploy-group
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only -a process-management-prototype-lingering-bush-6175
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
