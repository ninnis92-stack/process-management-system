{% extends "base.html" %}
{% block content %}
<h3>Edit Fields for {{ template.name }}</h3>
<form method="post">
  <table class="table">
    <thead>
      <tr><th>Label</th><th>Name/key</th><th>Type</th><th>Required</th></tr>
    </thead>
    <tbody>
      {% for f in fields %}
      <tr>
        <td><input class="form-control" name="field_{{ f.id }}_label" value="{{ f.label }}"/></td>
        <td><input class="form-control" name="field_{{ f.id }}_name" value="{{ f.name }}"/></td>
        <td>
          <select name="field_{{ f.id }}_type" class="form-select">
            <option value="text" {% if f.field_type=='text' %}selected{% endif %}>Text</option>
            <option value="textarea" {% if f.field_type=='textarea' %}selected{% endif %}>Textarea</option>
            <option value="select" {% if f.field_type=='select' %}selected{% endif %}>Select</option>
          </select>
        </td>
        <td><input type="checkbox" name="field_{{ f.id }}_required" value="1" {% if f.required %}checked{% endif %}></td>
        <td>
          <a class="btn btn-sm btn-outline-secondary" href="{{ url_for('admin.edit_field_verification', field_id=f.id) }}">Verify</a>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>

  <button class="btn btn-primary">Save fields</button>
</form>
<hr/>
<h4>External Integration</h4>
<form method="post">
  <div class="form-check mb-2">
    <input class="form-check-input" type="checkbox" id="external_enabled" name="external_enabled" value="1" {% if template.external_enabled %}checked{% endif %}>
    <label class="form-check-label" for="external_enabled">Use external form (e.g. Microsoft Forms)</label>
  </div>
  <div class="mb-2">
    <label class="form-label">External provider</label>
    <input class="form-control" name="external_provider" value="{{ template.external_provider or '' }}" />
  </div>
  <div class="mb-2">
    <label class="form-label">External form URL</label>
    <input class="form-control" name="external_form_url" value="{{ template.external_form_url or '' }}" />
  </div>
  <div class="mb-2">
    <label class="form-label">External form id</label>
    <input class="form-control" name="external_form_id" value="{{ template.external_form_id or '' }}" />
  </div>
  <button class="btn btn-outline-primary">Save external settings</button>
</form>
{% endblock %}
