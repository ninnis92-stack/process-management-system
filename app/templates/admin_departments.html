{% extends "base.html" %}

{% block content %}
  <h2>Departments</h2>
  <a class="btn btn-sm btn-primary mb-3" href="{{ url_for('admin.create_department') }}">New Department</a>
  <table class="table table-striped">
    <thead><tr><th>Code</th><th>Label</th><th>Active</th><th></th></tr></thead>
    <tbody>
      {% for d in departments %}
        <tr>
          <td>{{ d.code }}</td>
          <td>{{ d.label }}</td>
          <td>{{ 'Yes' if d.is_active else 'No' }}</td>
          <td>
            <a class="btn btn-sm btn-secondary" href="{{ url_for('admin.edit_department', dept_id=d.id) }}">Edit</a>
            <form method="post" action="{{ url_for('admin.delete_department', dept_id=d.id) }}" style="display:inline;" onsubmit="return confirm('Delete?');">
              <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
              <button class="btn btn-sm btn-danger">Delete</button>
            </form>
          </td>
        </tr>
      {% endfor %}
    </tbody>
  </table>
{% endblock %}
