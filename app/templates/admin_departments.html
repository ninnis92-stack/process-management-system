{% extends "base.html" %}
{% block content %}
<h2>Departments</h2>
<a class="btn btn-primary" href="{{ url_for('admin.departments_new') }}">New Department</a>
<hr/>
<ul class="list-group">
{% for d in departments %}
  <li class="list-group-item d-flex justify-content-between align-items-center">
    <div>
      <strong>{{ d.code }}</strong> — {{ d.name }}
    </div>
    <div>
      <a class="btn btn-sm btn-outline-secondary" href="{{ url_for('admin.departments_edit', dept_id=d.id) }}">Edit</a>
      <form method="post" action="{{ url_for('admin.departments_delete', dept_id=d.id) }}" style="display:inline" onsubmit="return confirm('Delete department?');">
        <button class="btn btn-sm btn-danger">Delete</button>
      </form>
    </div>
  </li>
{% else %}
  <li class="list-group-item">No departments yet.</li>
{% endfor %}
</ul>
{% endblock %}
