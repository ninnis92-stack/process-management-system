{% extends "base.html" %}
{% block content %}
<div class="container my-3">
  <div class="card">
    <div class="card-header">
      <strong>Debug Workspace</strong>
      <div class="small text-muted">This workspace mirrors the app for debugging. For session isolation open in a Private/Incognito window.</div>
    </div>
    <div class="card-body">
      <div class="mb-2">
        <small class="text-muted">Loaded path: <code>{{ path }}</code></small>
      </div>
      <iframe src="{{ path }}" style="width:100%; height:80vh; border:1px solid var(--border); border-radius:8px;" sandbox="allow-same-origin allow-forms allow-scripts allow-popups"></iframe>
    </div>
  </div>
</div>
{% endblock %}
