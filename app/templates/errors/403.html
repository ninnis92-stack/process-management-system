{% extends 'base.html' %}
{% block page_header %}Access Denied{% endblock %}
{% block content %}
<div class="alert alert-danger mt-4" role="alert">
  <h2 class="mb-3">403 Forbidden</h2>
  <p>You do not have permission to access this resource.</p>
  <p class="text-muted small">If you believe this is an error, please contact your administrator.</p>
  <a href="{{ url_for('requests.dashboard') }}" class="btn btn-primary mt-3">Return to Dashboard</a>
</div>
{% endblock %}
