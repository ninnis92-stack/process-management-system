{% extends "base.html" %}
{% block content %}
<h2>Add Status to {{ bucket.name }}</h2>
<form method="post">
  {{ form.hidden_tag() }}
  <div class="mb-3">{{ form.status_code.label }}{{ form.status_code(class_='form-control') }}</div>
  <div class="mb-3">{{ form.order.label }}{{ form.order(class_='form-control') }}</div>
  <button class="btn btn-primary">Add</button>
</form>
{% endblock %}
