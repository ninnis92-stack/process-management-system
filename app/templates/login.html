{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow-sm">
      <div class="card-body">
        <h4 class="mb-3">Login</h4>
        {% if con***REMOVED***g.SSO_ENABLED %}
          <a class="btn btn-outline-primary w-100 mb-3" href="{{ url_for('auth.sso_login') }}">Sign in with SSO</a>
          <div class="text-muted small mb-2">Having trouble? Use local login below.</div>
        {% endif %}
        <form method="post">
          {{ form.csrf_token }}
          <div class="mb-3">
            <label class="form-label">Email</label>
            {{ form.email(class="form-control") }}
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            {{ form.password(class="form-control") }}
          </div>
          <button class="btn btn-primary w-100">Sign in</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
