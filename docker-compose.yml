version: '3.8'
services:
  web:
    build: .
    command: gunicorn -w 2 -b 0.0.0.0:8080 run:app
    environment:
      - FLASK_ENV=development
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/postgres
      - REDIS_URL=redis://redis:6379/0
      - RQ_ENABLED=1
      - SECRET_KEY=change-me
      - AUTO_CREATE_DB=1
    ports:
      - '8080:8080'
    depends_on:
      - db
      - redis

  worker:
    build: .
    command: python3 scripts/rq_worker.py
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/postgres
      - SECRET_KEY=change-me
    depends_on:
      - redis
      - db

  db:
    image: postgres:15
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - '5432:5432'
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - '6379:6379'

volumes:
  db_data:
