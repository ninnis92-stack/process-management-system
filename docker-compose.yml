version: '3.8'
services:
  web:
    build: .
    init: true
    restart: unless-stopped
    command: gunicorn -w 2 --threads 4 -k gthread -b 0.0.0.0:8080 run:app
    environment:
      - FLASK_ENV=development
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/postgres
      - REDIS_URL=redis://redis:6379/0
      - RQ_ENABLED=1
      - SECRET_KEY=change-me
      - UPLOAD_FOLDER=/data/uploads
      - AUTO_CREATE_DB=1
      - SEED_ON_BOOT=1
      - RUN_SEED_ON_RELEASE=1
    ports:
      - '8080:8080'
    volumes:
      - uploads_data:/data/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/ready', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 20s

  worker:
    build: .
    init: true
    restart: unless-stopped
    command: python3 scripts/rq_worker.py
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/postgres
      - SECRET_KEY=change-me
      - UPLOAD_FOLDER=/data/uploads
      - AUTO_CREATE_DB=0
      - SEED_ON_BOOT=0
    volumes:
      - uploads_data:/data/uploads
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy

  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - '5432:5432'
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - '6379:6379'
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12

volumes:
  db_data:
  uploads_data:
