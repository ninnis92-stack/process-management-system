# fly.toml app configuration for process-management-prototype-lingering-bush-6175
app = 'process-management-prototype-lingering-bush-6175'
primary_region = 'ord'

[build]

[env]
  FLASK_DEBUG = "0"
  AUTO_CREATE_DB = "0"
  WAIT_FOR_DB = "true"

[[services]]
  internal_port = 8080
  processes = ["web"]

  [[services.ports]]
    handlers = ["http"]
    port = 80

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

  [[services.http_checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "30s"
    method = "get"
    path = "/ready"
    protocol = "http"

[processes]
# Tuned for small shared-cpu instances: 3 workers, 4 threads each.
# Adjust `-w` and `--threads` for your target machine size and workload.
  # Bind to the internal port (8080) so Fly's launcher doesn't try to parse a
  # literal '$PORT' in the process command.
  web = "gunicorn -w 3 --threads 4 -k gthread -b 0.0.0.0:8080 run:app"

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024

[deploy]
  # Run a one-time migration / table-creation step during deploy so new
  # instances won't start with missing tables. For production, replace
  # this with your Alembic command (e.g. `alembic upgrade head`). The
  # `release_tasks.py` will also run `seed.py` unless `SSO_ENABLED` is set.
  release_command = "python scripts/release_tasks.py"
