# fly.toml app configuration for process-management-prototype-lingering-bush-6175
app = 'process-management-prototype-lingering-bush-6175'
primary_region = 'ord'

[build]

[env]
  FLASK_DEBUG = "0"

[[services]]
  internal_port = 8080
  processes = ["web"]

  [[services.ports]]
    handlers = ["http"]
    port = 80

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

[processes]
# Tuned for small shared-cpu instances: 3 workers, 4 threads each.
# Adjust `-w` and `--threads` for your target machine size and workload.
  web = "gunicorn -w 3 --threads 4 -k gthread -b 0.0.0.0:$PORT run:app"

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
