global:
  scrape_interval: 30s
  evaluation_interval: 30s

scrape_configs:
  - job_name: process-management-prototype
    metrics_path: /metrics
    scheme: https
    static_configs:
      - targets:
          - process-management-prototype-lingering-bush-6175.fly.dev
        labels:
          app: process-management-prototype
          env: production
          provider: fly
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
